# Netlify configuration for Kabelo's Tasty Bakery (static site)
# No build step is required — the site is plain HTML/CSS/JS served from the repo root.

[build]
  publish = "."

# --- Caching ---------------------------------------------------------------
# HTML is always revalidated so content/SEO updates appear immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images and fonts change rarely — cache them for 30 days.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# CSS/JS cached for a day (no filename hashing in this project).
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# --- Basic security headers ------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
